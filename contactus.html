<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Cat Home Cattery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <h1>Cat Home</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="aboutus.html">About Us</a></li>
                    <li><a href="products.html">Cats</a></li>
                    <li><a href="contactus.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="section-title">Connect With Us</h2>
        
        <div class="contact-split-view">
            <section class="form-card">
                <form action="#" method="POST">
                    <div class="input-container">
                        <label for="full-name">Your Full Name</label>
                        <input type="text" id="full-name" name="name" placeholder="E.g., Chloe Tan" required>
                    </div>
                    <div class="input-container">
                        <label for="email-address">Email Address</label>
                        <input type="email" id="email-address" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="input-container">
                        <label for="msg-subject">Subject</label>
                        <input type="text" id="msg-subject" name="subject" placeholder="Kitten adoption application" required>
                    </div>
                    <div class="input-container">
                        <label for="user-message">Message</label>
                        <textarea id="user-message" name="message" rows="5" placeholder="Tell us about your home setup..." required></textarea>
                    </div>
                    <button type="submit" class="btn-rounded">Send Inquiry</button>
                </form>
            </section>

            <section class="map-card">
                <h3>Our Sanctuary Location</h3>
                <p style="font-size: 14px; margin-top: 5px; color: #6a5b5c;">
                    <i class="fas fa-map-marked-alt" style="color: var(--elegant-gold);"></i> 
                    123 Purrfect Avenue, Singapore
                </p>
                <div class="map-wrapper">
                    <iframe src="https://maps.google.com/maps?q=123%20Purrfect%20Avenue,%20Singapore&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p><strong>Cat Home Cattery</strong></p>
            <p><i class="fas fa-map-marker-alt"></i> 123 Purrfect Avenue, #04-12, Singapore | <i class="fas fa-phone"></i> +65 9123 4567</p>
            <p><i class="fas fa-envelope"></i> Email: <a href="mailto:contact@cathomecattery.com">contact@cathomecattery.com</a></p>
            <div class="social-strip">
                <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
